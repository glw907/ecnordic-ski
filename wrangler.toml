name = "ecnordic"
compatibility_date = "2025-01-25"
compatibility_flags = ["nodejs_compat"]

main = ".svelte-kit/cloudflare/_worker.js"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[[send_email]]
name = "SEND_EMAIL"
destination_address = "contact@ecnordic.ski"

# cairn-cms: unrestricted Email Sending binding for magic links (arbitrary recipients).
# remote = true so `wrangler dev` sends real mail.
[[send_email]]
name = "EMAIL"
remote = true

# cairn-cms: legacy hand-rolled auth store (magic-link nonces, sessions, allowlist).
# Kept for rollback grace during the better-auth cutover; removed once D1 is stable in prod.
[[kv_namespaces]]
binding = "AUTH_KV"
id = "73e2f799e9864398ab5e57c02272fe04"

# cairn-cms: better-auth store — users (= editor allowlist), sessions, magic-link verifications.
[[d1_databases]]
binding = "AUTH_DB"
database_name = "cairn-ecnordic-auth"
database_id = "83178db3-0aae-4c1d-b6ad-1626193ebefd"
migrations_dir = "drizzle/migrations"

[vars]
# better-auth base URL (prod origin). Dev overrides via PUBLIC_ORIGIN in .dev.vars.
BETTER_AUTH_URL = "https://ecnordic.ski"

[[routes]]
pattern = "ecnordic.ski"
custom_domain = true
