name = "ecnordic"
compatibility_date = "2025-01-25"
compatibility_flags = ["nodejs_compat"]

main = ".svelte-kit/cloudflare/_worker.js"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[[send_email]]
name = "SEND_EMAIL"
destination_address = "contact@ecnordic.ski"

[[routes]]
pattern = "ecnordic.ski"
custom_domain = true
