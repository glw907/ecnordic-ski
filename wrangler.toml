name = "ecxc"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

main = ".svelte-kit/cloudflare/_worker.js"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[[send_email]]
name = "SEND_EMAIL"
destination_address = "contact@ecnordic.ski"

# cairn-cms: unrestricted Email Sending binding for magic links (arbitrary recipients).
# remote = true so `wrangler dev` sends real mail.
[[send_email]]
name = "EMAIL"
remote = true

# cairn-cms: self-owned magic-link auth store (editor allowlist, magic_token, session tables).
[[d1_databases]]
binding = "AUTH_DB"
database_name = "cairn-ecxc-auth"
database_id = "a47c56d2-25ef-4131-a505-8c9fd5a92f1f"

[vars]
# Site origin, used to build magic links. Dev overrides via PUBLIC_ORIGIN in .dev.vars.
PUBLIC_ORIGIN = "https://ecxc.ski"

[[routes]]
pattern = "ecxc.ski"
custom_domain = true
